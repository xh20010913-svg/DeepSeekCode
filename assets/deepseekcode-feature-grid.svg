      <text x="28" y="78" fill="#cbd5e1" font-size="19">runs · tasks · actions · events</text>
      <text x="28" y="108" fill="#94a3b8" font-size="18">SQLite-backed trace and resume data</text>
    </g>
    <g transform="translate(72 372)">
